name: Publish Launcher Docs

on:
  push:
    branches:
      - main
    paths:
      - "data-analysis/qp2/docs/launchers/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render launcher docs
        run: quarto render data-analysis/qp2/docs/launchers

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: data-analysis/qp2/docs/launchers/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
