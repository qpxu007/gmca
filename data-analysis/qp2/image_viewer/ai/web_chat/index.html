<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QP2 Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #16213e; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
  #header h1 { font-size: 16px; color: #e94560; }
  #users { font-size: 12px; color: #7f8c8d; }
  #messages { flex: 1; overflow-y: auto; padding: 12px; scroll-behavior: smooth; }
  .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; max-width: 85%; word-wrap: break-word; line-height: 1.4; }
  .msg.user { background: #0f3460; margin-left: auto; }
  .msg.assistant { background: #1a3a5c; border-left: 3px solid #e94560; }
  .msg.event { text-align: center; color: #7f8c8d; font-style: italic; font-size: 12px; max-width: 100%; }
  .msg .sender { font-weight: bold; font-size: 12px; margin-bottom: 2px; }
  .msg.user .sender { color: #3498db; }
  .msg.assistant .sender { color: #e94560; }
  .msg pre { background: #0d1117; padding: 8px; border-radius: 4px; overflow-x: auto; margin: 6px 0; font-size: 13px; }
  .msg code { font-family: "SF Mono", Consolas, monospace; font-size: 13px; }
  #input-area { display: flex; gap: 8px; padding: 10px 12px; background: #16213e; border-top: 1px solid #0f3460; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
  #input-area input { flex: 1; padding: 10px 14px; border: 1px solid #0f3460; border-radius: 20px; background: #1a1a2e; color: #e0e0e0; font-size: 16px; outline: none; }
  #input-area input:focus { border-color: #e94560; }
  #input-area button { width: 44px; height: 44px; border: none; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  #send-btn { background: #e94560; color: white; }
  #mic-btn { background: #0f3460; color: #e0e0e0; }
  #mic-btn.listening { background: #e94560; animation: pulse 1s infinite; }
  #ai-btn { background: #533483; color: white; font-size: 14px; }
  #ai-btn:disabled, #send-btn:disabled { opacity: 0.5; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  #name-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 10; }
  #name-overlay div { background: #16213e; padding: 24px; border-radius: 12px; text-align: center; }
  #name-overlay input { padding: 10px; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; font-size: 16px; width: 200px; margin: 12px 0; }
  #name-overlay button { padding: 10px 24px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>

<div id="name-overlay">
  <div>
    <h2 style="color:#e94560; margin-bottom:8px;">QP2 Chat</h2>
    <p style="color:#7f8c8d; font-size:13px;">Enter your name to join</p>
    <input id="name-input" placeholder="Your name" autofocus>
    <br>
    <button onclick="joinChat()">Join</button>
  </div>
</div>

<div id="header">
  <h1>QP2 Chat <span id="room-label" style="color:#7f8c8d; font-size:12px;"></span></h1>
  <span id="users"></span>
</div>

<div id="messages"></div>

<div id="input-area">
  <button id="mic-btn" onclick="toggleMic()" title="Voice input">&#127908;</button>
  <input id="msg-input" placeholder="Type a message..." autocomplete="off">
  <button id="send-btn" onclick="sendMsg()" title="Send">&#9654;</button>
  <button id="ai-btn" onclick="askAI()" title="Ask AI">AI</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const room = params.get('room') || '';
const roomParam = room ? `?room=${room}` : '';
let username = '';
let seenIds = new Set();

document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

function joinChat() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) return;
  username = name;
  document.getElementById('name-overlay').style.display = 'none';
  loadHistory();
  connectSSE();
  if (room) document.getElementById('room-label').textContent = `(${room})`;
}

async function loadHistory() {
  try {
    const res = await fetch(`/api/history${roomParam}`);
    const data = await res.json();
    if (data.room && !room) document.getElementById('room-label').textContent = `(${data.room})`;
    data.messages.forEach(m => appendMsg(m));
  } catch (e) { console.error('History load failed:', e); }
}

function connectSSE() {
  const es = new EventSource(`/api/stream${roomParam}`);
  es.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (!seenIds.has(msg.msg_id)) appendMsg(msg);
    } catch (err) { console.error('SSE parse error:', err); }
  };
  es.onerror = () => setTimeout(() => connectSSE(), 3000);
}

function appendMsg(msg) {
  if (msg.msg_id) seenIds.add(msg.msg_id);
  const div = document.createElement('div');
  const role = msg.event_type ? 'event' : (msg.role || 'user');
  div.className = `msg ${role}`;

  if (role === 'event') {
    div.textContent = msg.content;
  } else {
    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = msg.user || (role === 'assistant' ? 'AI' : 'User');
    div.appendChild(sender);

    const body = document.createElement('div');
    // Simple code block rendering
    let content = msg.content || '';
    content = content.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
    content = content.replace(/\n/g, '<br>');
    body.innerHTML = content;
    div.appendChild(body);
  }

  const container = document.getElementById('messages');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !username) return;
  input.value = '';

  try {
    const res = await fetch(`/api/send${roomParam}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content: text, user: username, role: 'user'})
    });
    const data = await res.json();
    if (data.msg_id) seenIds.add(data.msg_id);
  } catch (e) { console.error('Send failed:', e); }
}

async function askAI() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !username) return;
  input.value = '';

  const btn = document.getElementById('ai-btn');
  btn.disabled = true;
  btn.textContent = '...';

  try {
    const res = await fetch(`/api/ask_ai${roomParam}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content: text, user: username})
    });
    const data = await res.json();
    if (data.msg_id) seenIds.add(data.msg_id);
  } catch (e) { console.error('AI request failed:', e); }
  finally { btn.disabled = false; btn.textContent = 'AI'; }
}

// --- Voice Input ---
let recognition = null;
function toggleMic() {
  const btn = document.getElementById('mic-btn');
  if (recognition) { recognition.stop(); return; }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert('Speech recognition not supported in this browser.'); return; }

  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;

  recognition.onstart = () => btn.classList.add('listening');
  recognition.onend = () => { btn.classList.remove('listening'); recognition = null; };
  recognition.onerror = () => { btn.classList.remove('listening'); recognition = null; };
  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    document.getElementById('msg-input').value = text;
  };
  recognition.start();
}
</script>
</body>
</html>
