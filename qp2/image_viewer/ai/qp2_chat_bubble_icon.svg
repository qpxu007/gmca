<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Speech Bubble -->
  <path d="M 8 16 A 8 8 0 0 1 16 8 L 48 8 A 8 8 0 0 1 56 16 L 56 40 A 8 8 0 0 1 48 48 L 24 48 L 8 58 L 8 48 A 4 4 0 0 1 8 48 Z" 
        fill="url(#bubbleGrad)" stroke="#1f618d" stroke-width="2" filter="url(#dropShadow)"/>
  
  <!-- "Chat" Text -->
  <text x="32" y="34" font-family="sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle" style="text-shadow: 1px 1px 1px #1f618d;">Chat</text>
  
  <!-- Decorative dots to imply speech/typing -->
  <circle cx="24" cy="42" r="2" fill="white" opacity="0.8"/>
  <circle cx="32" cy="42" r="2" fill="white" opacity="0.8"/>
  <circle cx="40" cy="42" r="2" fill="white" opacity="0.8"/>
</svg>